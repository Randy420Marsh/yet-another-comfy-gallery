<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Gallery Pro</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --border: #334155;
            --glass: rgba(15, 23, 42, 0.9);
            --positive: #10b981;
            --negative: #ef4444;
        }
        [data-theme="light"] {
            --bg: #f8f9fa;
            --card-bg: #ffffff;
            --text: #1a1a1a;
            --text-muted: #64748b;
            --accent: #2563eb;
            --border: #e2e8f0;
            --glass: rgba(255, 255, 255, 0.9);
        }
        * { box-sizing: border-box; transition: background-color 0.2s, color 0.2s; }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            overflow-x: hidden;
        }
        header {
            position: sticky; top: 0; z-index: 100;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 1.5rem;
            display: flex; justify-content: space-between; align-items: center;
        }
        .search-bar {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 0.5rem 1rem;
            border-radius: 99px;
            color: var(--text);
            width: 300px;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1.5rem;
            padding: 2rem;
            max-width: 1600px;
            margin: 0 auto;
        }
        .item {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
            cursor: pointer;
            position: relative;
            transition: transform 0.15s, border-color 0.15s;
        }
        .item:hover { transform: translateY(-4px); border-color: var(--accent); }
        .item img { width: 100%; height: 200px; object-fit: cover; display: block; }
        .item-info { padding: 0.75rem; font-size: 0.85rem; font-weight: 500; text-align: center; }
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: none; z-index: 1000;
            justify-content: center; align-items: center;
            padding: 2rem;
        }
        .modal-content {
            background: var(--bg);
            width: 100%; max-width: 1300px; height: 90vh;
            border-radius: 16px;
            display: flex; overflow: hidden;
            border: 1px solid var(--border);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        .preview-pane { flex: 1; background: #000; display: flex; align-items: center; justify-content: center; position: relative; }
        .preview-pane img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .info-pane { width: 450px; background: var(--card-bg); border-left: 1px solid var(--border); display: flex; flex-direction: column; }
        .info-header { padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); }
        .tabs { display: flex; background: var(--bg); padding: 0.25rem; gap: 0.25rem; border-bottom: 1px solid var(--border); }
        .tab {
            flex: 1; padding: 0.5rem; text-align: center; font-size: 0.75rem; font-weight: bold;
            cursor: pointer; border-radius: 6px; color: var(--text-muted);
        }
        .tab.active { background: var(--card-bg); color: var(--accent); }
        .info-body { flex: 1; overflow-y: auto; padding: 1.5rem; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .tag { font-size: 0.7rem; text-transform: uppercase; padding: 2px 8px; border-radius: 4px; background: var(--accent); color: white; margin-bottom: 0.5rem; display: inline-block; }
        .prompt-section { margin-bottom: 1.5rem; }
        .prompt-label { font-size: 0.75rem; color: var(--text-muted); font-weight: bold; margin-bottom: 0.5rem; display: flex; justify-content: space-between; align-items: center; }
        .prompt-box {
            background: var(--bg); border: 1px solid var(--border); padding: 0.75rem; border-radius: 8px;
            font-family: 'Monaco', 'Consolas', monospace; font-size: 0.8rem; line-height: 1.4;
            max-height: 300px; overflow-y: auto; white-space: pre-wrap; word-break: break-word;
        }
        .raw-box {
            background: #000; color: #10b981; border: 1px solid var(--border); padding: 1rem; border-radius: 8px;
            font-family: 'Monaco', 'Consolas', monospace; font-size: 0.75rem; line-height: 1.4;
            overflow: auto; white-space: pre; height: 100%; max-height: 60vh;
        }
        .copy-btn { cursor: pointer; color: var(--accent); font-size: 0.7rem; border: 1px solid var(--border); padding: 2px 6px; border-radius: 4px; background: var(--bg); }
        .copy-btn:hover { background: var(--border); }
        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin-top: 0.5rem; }
        .setting-item { background: var(--bg); padding: 0.5rem; border-radius: 6px; border: 1px solid var(--border); }
        .setting-key { font-size: 0.65rem; color: var(--text-muted); display: block; }
        .setting-val { font-size: 0.8rem; font-weight: 600; }
        .close-modal { position: absolute; top: 1rem; right: 1rem; font-size: 2rem; color: white; cursor: pointer; z-index: 10; }
        #galleryError { display: none; text-align: center; padding: 4rem; color: var(--text-muted); }
        @media (max-width: 900px) {
            .modal-content { flex-direction: column; height: 95vh; }
            .info-pane { width: 100%; height: 60%; border-left: none; border-top: 1px solid var(--border); }
        }
    </style>
</head>
<body data-theme="dark">

<header>
    <h2 style="margin:0; font-size: 1.25rem;">AI Gallery</h2>
    <input type="search" class="search-bar" id="searchInput" placeholder="Filter by filename...">
    <button id="themeToggle" style="background:none; border:none; cursor:pointer; font-size: 1.2rem;" title="Toggle theme">🌓</button>
</header>

<main class="gallery" id="galleryContainer"></main>
<div id="galleryError">
    <p style="font-size:1.5rem;">⚠️ Could not load images</p>
    <p>Make sure the Flask server is running and the <code>images/</code> folder exists.</p>
</div>

<div class="modal" id="detailModal">
    <span class="close-modal" id="closeModal">&times;</span>
    <div class="modal-content">
        <div class="preview-pane">
            <img id="modalImg" src="" alt="Full view">
        </div>
        <div class="info-pane">
            <div class="info-header">
                <span id="sourceBadge" class="tag">Scanning…</span>
                <h3 id="imageName" style="margin: 0.4rem 0 0; font-size: 1rem; word-break: break-all;">image.png</h3>
            </div>
            <!-- FIX: tab elements now have IDs so switchTab() can target them reliably -->
            <div class="tabs">
                <div class="tab active" id="tabHandle-formatted" onclick="switchTab('formatted')">CLEAN VIEW</div>
                <div class="tab" id="tabHandle-raw" onclick="switchTab('raw')">RAW DATA</div>
            </div>
            <div class="info-body">
                <div id="tab-formatted" class="tab-content active">
                    <div class="prompt-section">
                        <div class="prompt-label">
                            <span>POSITIVE PROMPT</span>
                            <!-- FIX: pass `this` so copyText receives the button without relying on global event -->
                            <button class="copy-btn" onclick="copyText('posText', this)">Copy</button>
                        </div>
                        <div class="prompt-box" id="posText">Extracting…</div>
                    </div>
                    <div class="prompt-section">
                        <div class="prompt-label">
                            <span style="color:var(--negative)">NEGATIVE PROMPT</span>
                            <button class="copy-btn" onclick="copyText('negText', this)">Copy</button>
                        </div>
                        <div class="prompt-box" id="negText">None</div>
                    </div>
                    <div class="prompt-label">GENERATION SETTINGS</div>
                    <div class="settings-grid" id="settingsGrid"></div>
                </div>
                <div id="tab-raw" class="tab-content">
                    <div class="prompt-label">
                        <span>FULL METADATA CHUNKS</span>
                        <button class="copy-btn" onclick="copyText('rawText', this)">Copy All</button>
                    </div>
                    <div class="raw-box" id="rawText">Loading…</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// ==================== SHARED AI METADATA LIBRARY v2.0 ====================
// This block is identical in both index.html and single-image.html.
// Edit in one place and copy to the other.

/** Escape HTML special chars to prevent XSS when inserting metadata into innerHTML. */
function escapeHtml(str) {
    return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
}

/**
 * Parse PNG text chunks (tEXt, iTXt, zTXt).
 * FIX: loop guard changed from byteLength-8 to byteLength-12 (minimum chunk = 12 bytes).
 * FIX: iTXt correctly skips compression flag, method, language tag, and translated keyword.
 * FIX: added IEND early-exit and per-chunk bounds check against malformed data.
 */
function extractPNGMetadata(buffer) {
    const view = new DataView(buffer);
    const metadata = {};
    let offset = 8; // skip 8-byte PNG signature

    while (offset < buffer.byteLength - 12) {
        if (offset + 8 > buffer.byteLength) break;
        const len = view.getUint32(offset, false); // big-endian
        if (offset + 12 + len > buffer.byteLength) break; // malformed / truncated

        const type = String.fromCharCode(
            view.getUint8(offset + 4), view.getUint8(offset + 5),
            view.getUint8(offset + 6), view.getUint8(offset + 7)
        );

        if (type === 'IEND') break;

        if (type === 'tEXt' || type === 'iTXt' || type === 'zTXt') {
            const chunk = new Uint8Array(buffer, offset + 8, len);
            const nullIdx = chunk.indexOf(0);
            if (nullIdx !== -1) {
                const key = new TextDecoder().decode(chunk.subarray(0, nullIdx));
                let value = '';

                if (type === 'zTXt') {
                    // compression method (1 byte) + deflate data
                    // Full decode needs pako.js: pako.inflate(chunk.subarray(nullIdx + 2), {to:'string'})
                    value = '[zTXt compressed — include pako.js for full decode]';

                } else if (type === 'iTXt') {
                    // FIX: iTXt layout after keyword null:
                    //   [1] compression flag  [1] compression method
                    //   [n] language tag \0   [n] translated keyword \0
                    //   [rest] UTF-8 text (possibly compressed)
                    let pos = nullIdx + 1;
                    const compressionFlag = chunk[pos] || 0;
                    pos += 2; // skip flag + method
                    while (pos < chunk.length && chunk[pos] !== 0) pos++; // skip language tag
                    pos++; // skip null
                    while (pos < chunk.length && chunk[pos] !== 0) pos++; // skip translated keyword
                    pos++; // skip null
                    if (compressionFlag === 0) {
                        value = new TextDecoder('utf-8', { fatal: false }).decode(chunk.subarray(pos));
                    } else {
                        value = '[iTXt compressed — include pako.js for full decode]';
                    }

                } else {
                    // tEXt: technically latin-1, but A1111 writes UTF-8
                    value = new TextDecoder('utf-8', { fatal: false }).decode(chunk.subarray(nullIdx + 1));
                }

                metadata[key] = value;
            }
        }

        offset += 12 + len; // 4 (length) + 4 (type) + len (data) + 4 (CRC)
    }
    return metadata;
}

/**
 * Parse JPEG EXIF APP1 segment, or dispatch to WebP handler.
 * FIX: added EOI (0xFFD9) guard alongside SOS.
 * FIX: bounds check before reading segment length.
 */
function extractEXIFMetadata(buffer) {
    const data = new DataView(buffer);
    const metadata = {};

    if (data.getUint16(0) !== 0xFFD8) {
        // Try WebP RIFF
        if (buffer.byteLength >= 4 && data.getUint32(0, true) === 0x52494646) {
            return extractWebPExif(buffer);
        }
        return metadata;
    }

    let offset = 2;
    while (offset < buffer.byteLength - 4) {
        if (offset + 2 > buffer.byteLength) break;
        const marker = data.getUint16(offset);

        if (marker === 0xFFD9 || marker === 0xFFDA) break; // EOI or SOS

        if (marker === 0xFFE1) { // APP1
            const length = data.getUint16(offset + 2);
            if (offset + 4 + length > buffer.byteLength) break;
            const app1 = new Uint8Array(buffer, offset + 4, Math.min(length - 2, 6));
            // "Exif\0\0" header
            if (app1[0] === 0x45 && app1[1] === 0x78 && app1[2] === 0x69 && app1[3] === 0x66) {
                try { return parseExifDir(buffer, offset + 4 + 6); }
                catch (e) { console.warn('EXIF parse error:', e); }
            }
            offset += 2 + length;
            continue;
        }

        if ((marker & 0xFF00) === 0xFF00 && marker !== 0xFFFF) {
            if (offset + 4 > buffer.byteLength) break;
            offset += 2 + data.getUint16(offset + 2);
        } else {
            offset++;
        }
    }
    return metadata;
}

/**
 * Parse WebP EXIF chunk.
 * FIX: detect and skip optional "Exif\0\0" prefix that some encoders prepend.
 */
function extractWebPExif(buffer) {
    const data = new DataView(buffer);
    let offset = 12; // after "RIFF"(4) + size(4) + "WEBP"(4)
    while (offset + 8 <= buffer.byteLength) {
        const ct = String.fromCharCode(
            data.getUint8(offset),     data.getUint8(offset + 1),
            data.getUint8(offset + 2), data.getUint8(offset + 3)
        );
        const size = data.getUint32(offset + 4, true);
        if (ct === 'EXIF') {
            let exifStart = offset + 8;
            // FIX: some encoders prepend "Exif\0\0" (6 bytes) before the TIFF header
            if (exifStart + 6 <= buffer.byteLength) {
                const b = new Uint8Array(buffer, exifStart, 4);
                if (b[0] === 0x45 && b[1] === 0x78 && b[2] === 0x69 && b[3] === 0x66) {
                    exifStart += 6;
                }
            }
            try { return parseExifDir(buffer, exifStart); } catch (e) {}
        }
        offset += 8 + size + (size & 1); // RIFF chunks are word-aligned
    }
    return {};
}

/**
 * Parse a TIFF IFD starting at tiffStart within the buffer.
 * Extracts UserComment (0x9286) and recurses into SubIFD / GPS / Interop.
 * FIX: validates TIFF magic (42) before proceeding.
 * FIX: sanity-caps numEntries to prevent runaway loops on corrupt data.
 * FIX: TYPE_SIZES table extended with all 12 TIFF types.
 */
function parseExifDir(buffer, tiffStart) {
    const data = new DataView(buffer);
    if (tiffStart + 8 > buffer.byteLength) return {};
    const isLittle = data.getUint16(tiffStart) === 0x4949; // 'II'
    if (data.getUint16(tiffStart + 2, isLittle) !== 42) return {}; // invalid TIFF magic

    const ifd0 = tiffStart + data.getUint32(tiffStart + 4, isLittle);
    const metadata = {};
    const visited = new Set();
    const TYPE_SIZES = { 1:1, 2:1, 3:2, 4:4, 5:8, 6:1, 7:1, 8:2, 9:4, 10:8, 11:4, 12:8 };

    function readIFD(offset) {
        if (offset + 2 > buffer.byteLength || visited.has(offset)) return;
        visited.add(offset);
        const numEntries = data.getUint16(offset, isLittle);
        if (numEntries > 1000) return; // sanity cap — corrupt data guard

        for (let i = 0; i < numEntries; i++) {
            const e = offset + 2 + i * 12;
            if (e + 12 > buffer.byteLength) break;

            const tag   = data.getUint16(e,     isLittle);
            const type  = data.getUint16(e + 2, isLittle);
            const count = data.getUint32(e + 4, isLittle);
            const sz    = (TYPE_SIZES[type] || 1) * count;

            // Value is inline if ≤4 bytes, otherwise it's an offset from tiffStart
            let vo = e + 8;
            if (sz > 4) vo = tiffStart + data.getUint32(vo, isLittle);
            if (vo + sz > buffer.byteLength) continue;

            // UserComment (0x9286) — A1111 stores "parameters" here in JPEG/WebP
            if (tag === 0x9286) {
                try {
                    const encBytes = new Uint8Array(buffer, vo, Math.min(8, count));
                    const enc = new TextDecoder('ascii', { fatal: false }).decode(encBytes);
                    const contentLen = Math.max(0, count - 8);
                    const content = new Uint8Array(buffer, vo + 8, contentLen);
                    const isUnicode = enc.startsWith('UNICODE');
                    const charSet = isUnicode ? (isLittle ? 'utf-16le' : 'utf-16be') : 'utf-8';
                    metadata['parameters'] = new TextDecoder(charSet, { fatal: false })
                        .decode(content).replace(/\0/g, '').trim();
                } catch (err) {
                    console.warn('UserComment decode error:', err);
                }
            }

            // Recurse into SubIFD (0x8769), GPS (0x8825), Interop (0xA005)
            // Always read pointer from e+8 (the raw IFD entry field) — not from vo,
            // which may have been remapped above.
            if (tag === 0x8769 || tag === 0x8825 || tag === 0xA005) {
                readIFD(tiffStart + data.getUint32(e + 8, isLittle));
            }
        }
    }

    readIFD(ifd0);
    return metadata;
}

/**
 * Scan raw bytes for A1111 parameters block or ComfyUI prompt/workflow JSON.
 * FIX: use Uint8Array(buffer, 0, N) — a zero-copy view — instead of .slice() which copies.
 */
function extractTextFallback(buffer) {
    const maxBytes = Math.min(900000, buffer.byteLength);
    const str = new TextDecoder('utf-8', { fatal: false })
        .decode(new Uint8Array(buffer, 0, maxBytes)); // FIX: view, not copy
    const meta = {};

    // Automatic1111 parameters block
    const a111 = str.match(/parameters[\x00-\x08]*([\s\S]{30,7000}?Steps:\s*\d+)/i);
    if (a111) meta.parameters = a111[1].replace(/\0/g, '').trim();

    // ComfyUI prompt JSON
    const comfy = str.match(/"prompt"\s*:\s*(\{[\s\S]{100,12000}?\})\s*[,}\0]/s)
               || str.match(/prompt\0+(\{[\s\S]{100,12000}?\})\0/s);
    if (comfy) meta.prompt = comfy[1];

    // ComfyUI workflow JSON
    const wf = str.match(/"workflow"\s*:\s*(\{[\s\S]{100,12000}?\})\s*[,}\0]/s)
            || str.match(/workflow\0+(\{[\s\S]{100,12000}?\})\0/s);
    if (wf) meta.workflow = wf[1];

    return meta;
}

/**
 * Convert raw metadata chunks into a structured {source, positive, negative, settings} object.
 * FIX: checks chunks.workflow as well as chunks.prompt (ComfyUI can embed either).
 * FIX: Scheduler added to settings (was missing in gallery version).
 * FIX: optional chaining (?.) used throughout for safety on malformed node data.
 */
function processMetadata(chunks) {
    const res = {
        source: 'Unknown',
        positive: 'No AI metadata found. This image may not contain embedded generation data.',
        negative: '',
        settings: {}
    };

    if (chunks.prompt || chunks.workflow) {
        res.source = 'ComfyUI';
        try {
            const graph = JSON.parse(chunks.prompt || chunks.workflow);

            const sampler = Object.values(graph).find(n =>
                n?.class_type && (n.class_type.includes('KSampler') || n.class_type.includes('Sampler'))
            );
            if (sampler?.inputs) {
                const inp = sampler.inputs;
                res.settings = {
                    Steps:     inp.steps     ?? '?',
                    CFG:       inp.cfg       ?? '?',
                    Sampler:   inp.sampler_name || inp.sampler || '?',
                    Scheduler: inp.scheduler || '?',
                    Seed:      inp.seed      ?? inp.noise_seed ?? '?',
                };
            }

            const textNodes = Object.values(graph).filter(n =>
                n?.inputs && (typeof n.inputs.text === 'string' || n?.class_type?.includes('Text'))
            );
            const texts = textNodes.map(n => n.inputs.text).filter(t => typeof t === 'string' && t.length > 10);
            if (texts.length > 0) {
                res.positive = texts[0];
                if (texts.length > 1) res.negative = texts[1];
            } else {
                res.positive = 'Complex workflow (LLM captioner / dynamic nodes). See RAW DATA tab.';
            }
        } catch (e) {
            res.positive = 'ComfyUI workflow detected — see RAW DATA tab.';
            console.warn('ComfyUI parse error:', e);
        }

    } else if (chunks.parameters) {
        res.source = 'Automatic1111';
        const p = chunks.parameters;
        const negIdx   = p.indexOf('Negative prompt:');
        const stepsIdx = p.lastIndexOf('Steps:');

        if (negIdx !== -1) {
            res.positive = p.slice(0, negIdx).trim();
            res.negative  = p.slice(negIdx + 16, stepsIdx !== -1 ? stepsIdx : p.length).trim();
        } else {
            res.positive = stepsIdx !== -1 ? p.slice(0, stepsIdx).trim() : p.trim();
        }

        if (stepsIdx !== -1) {
            p.slice(stepsIdx).split(/,(?=\s*[A-Za-z])/).forEach(part => {
                const [k, ...vParts] = part.split(':');
                if (k?.trim() && vParts.length) {
                    res.settings[k.trim()] = vParts.join(':').trim();
                }
            });
        }

    } else if (Object.keys(chunks).length > 0) {
        res.source = 'Unknown Format';
        res.positive = 'Metadata found but format not recognized. Check RAW DATA tab.';
    }

    return res;
}

/**
 * Build the settings grid HTML.
 * FIX: escapeHtml() used on all values to prevent XSS from crafted image metadata.
 */
function renderSettingsGrid(settings) {
    const entries = Object.entries(settings);
    if (!entries.length) {
        return "<p style='font-size:0.75rem; color:var(--text-muted)'>No generation settings detected.</p>";
    }
    return entries.map(([k, v]) =>
        `<div class="setting-item">` +
        `<span class="setting-key">${escapeHtml(k)}</span>` +
        `<span class="setting-val">${escapeHtml(String(v))}</span>` +
        `</div>`
    ).join('');
}

/** Format raw metadata chunks for the RAW DATA tab. */
function renderRawDisplay(raw) {
    if (!raw || !Object.keys(raw).length) return 'No metadata chunks found in this image.';
    return Object.entries(raw).map(([key, val]) => {
        let body;
        try   { body = JSON.stringify(JSON.parse(val), null, 2); }
        catch { body = String(val).substring(0, 8000); }
        return `[${key}]\n${body}\n`;
    }).join('\n');
}

// ==================== END SHARED AI METADATA LIBRARY ====================


// --- Gallery-specific code ---

const gallery       = document.getElementById('galleryContainer');
const detailModal   = document.getElementById('detailModal');
const modalImg      = document.getElementById('modalImg');
const searchInput   = document.getElementById('searchInput');
const galleryError  = document.getElementById('galleryError');

let allImages = [];

// Theme
const themeToggle = document.getElementById('themeToggle');
themeToggle.onclick = () => {
    const next = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    document.body.setAttribute('data-theme', next);
    localStorage.setItem('gallery-theme', next);
};
const savedTheme = localStorage.getItem('gallery-theme');
if (savedTheme) document.body.setAttribute('data-theme', savedTheme);

// FIX: switchTab now targets tabs by ID — no reliance on global `event`
function switchTab(type) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.getElementById(`tabHandle-${type}`).classList.add('active');
    document.getElementById(`tab-${type}`).classList.add('active');
}

// FIX: copyText accepts the button element explicitly — no global `event` reference
function copyText(id, btn) {
    const textEl = document.getElementById(id);
    if (!textEl) return;
    const text = textEl.textContent.trim();
    const flash = () => {
        if (!btn) return;
        const orig = btn.textContent;
        btn.textContent = '✅ Copied!';
        setTimeout(() => btn.textContent = orig, 1200);
    };
    navigator.clipboard.writeText(text).then(flash).catch(() => {
        // Fallback for contexts without clipboard API
        const range = document.createRange();
        range.selectNode(textEl);
        window.getSelection().removeAllRanges();
        window.getSelection().addRange(range);
        document.execCommand('copy');
        window.getSelection().removeAllRanges();
        flash();
    });
}

// FIX: render() uses data-idx attribute instead of inline JSON onclick,
// and escapes filename before inserting into innerHTML.
function render(items) {
    if (!items.length) {
        gallery.innerHTML = "<p style='grid-column:1/-1; text-align:center; color:var(--text-muted); padding:4rem'>No images found in the images/ folder.</p>";
        return;
    }
    gallery.innerHTML = items.map((img, idx) => {
        const name = escapeHtml(img.path.split('/').pop().replace(/\.[^/.]+$/, ''));
        const src  = escapeHtml(img.path) + '?mtime=' + encodeURIComponent(img.mtime);
        return `<div class="item" data-idx="${idx}">` +
               `<img src="${src}" loading="lazy" alt="${name}">` +
               `<div class="item-info">${name}</div>` +
               `</div>`;
    }).join('');
}

// FIX: event delegation for gallery clicks — avoids inline JS in HTML
gallery.addEventListener('click', e => {
    const item = e.target.closest('.item');
    if (item) {
        const idx = parseInt(item.dataset.idx, 10);
        if (!isNaN(idx) && allImages[idx]) openDetails(allImages[idx]);
    }
});

async function openDetails(imgObj) {
    modalImg.src = imgObj.path;
    document.getElementById('imageName').textContent = imgObj.path.split('/').pop();
    document.getElementById('sourceBadge').textContent = 'Scanning…';
    document.getElementById('posText').textContent    = 'Extracting metadata…';
    document.getElementById('negText').textContent    = 'Please wait…';
    document.getElementById('settingsGrid').innerHTML = '';
    document.getElementById('rawText').textContent    = 'Reading image bytes…';
    switchTab('formatted');

    detailModal.style.display = 'flex';
    document.body.style.overflow = 'hidden';

    try {
        const resp   = await fetch(imgObj.path);
        const buffer = await resp.arrayBuffer();
        let rawMeta  = {};

        const lower = imgObj.path.toLowerCase();
        if (lower.endsWith('.png')) {
            rawMeta = extractPNGMetadata(buffer);
        } else if (lower.endsWith('.jpg') || lower.endsWith('.jpeg') || lower.endsWith('.webp')) {
            rawMeta = extractEXIFMetadata(buffer);
            if (!Object.keys(rawMeta).length) rawMeta = extractTextFallback(buffer);
        } else {
            rawMeta = extractTextFallback(buffer);
        }

        const processed = processMetadata(rawMeta);
        document.getElementById('sourceBadge').textContent = processed.source;
        document.getElementById('posText').textContent     = processed.positive || 'No positive prompt found.';
        document.getElementById('negText').textContent     = processed.negative || 'None';
        document.getElementById('settingsGrid').innerHTML  = renderSettingsGrid(processed.settings);
        document.getElementById('rawText').textContent     = renderRawDisplay(rawMeta);
    } catch (e) {
        console.error('Metadata extraction error:', e);
        document.getElementById('sourceBadge').textContent = 'ERROR';
        document.getElementById('posText').textContent     = 'Failed to read metadata: ' + e.message;
    }
}

document.getElementById('closeModal').onclick = () => {
    detailModal.style.display = 'none';
    document.body.style.overflow = 'auto';
};

// Close modal on backdrop click
detailModal.addEventListener('click', e => {
    if (e.target === detailModal) {
        detailModal.style.display = 'none';
        document.body.style.overflow = 'auto';
    }
});

// Keyboard: Escape closes modal
document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && detailModal.style.display === 'flex') {
        detailModal.style.display = 'none';
        document.body.style.overflow = 'auto';
    }
});

searchInput.oninput = e => {
    const term = e.target.value.toLowerCase();
    render(allImages.filter(img => img.path.toLowerCase().includes(term)));
};

// FIX: fetchImages now has try/catch — previously a network error silently broke the page
async function fetchImages() {
    try {
        const res = await fetch('/api/images');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        allImages = await res.json();
        render(allImages);
    } catch (e) {
        console.error('Failed to fetch image list:', e);
        gallery.style.display = 'none';
        galleryError.style.display = 'block';
    }
}

fetchImages();
</script>
